<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Advanced Premium Chess: Master Edition</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="logo.svg" type="image/svg+xml">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="description" content="An advanced P2P multiplayer and Stockfish-powered offline chess client.">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --board-dark: #1e272e; 
            --board-light: #7f8c8d;
            --highlight: rgba(0, 0, 0, 0.25);
            --selected: rgba(255, 209, 102, 0.6);
            --danger: rgba(239, 71, 111, 0.8);
            --last-move: rgba(255, 255, 0, 0.25);
            --best-move: rgba(52, 152, 219, 0.6);
            --premove-src: rgba(155, 89, 182, 0.6);
            --premove-dst: rgba(155, 89, 182, 0.4);
            --text-light: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0; background-color: var(--bg-dark); color: var(--text-light); 
            font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-start; min-height: 100vh; overflow-x: hidden; 
            user-select: none; -webkit-tap-highlight-color: transparent; padding-top: 2vh;
        }

        .game-container { width: 100%; max-width: 480px; padding: 0 10px; display: flex; flex-direction: column; gap: 6px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 5px; }
        .brand-container { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        header h1 { font-size: clamp(1.2rem, 4vw, 1.5rem); margin: 0; letter-spacing: 1px; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        
        .network-badge { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 20px; }
        .network-dot { width: 8px; height: 8px; border-radius: 50%; background-color: #2ecc71; display: inline-block; }
        .elo-badge { background: linear-gradient(145deg, #ffd700, #daa520); color: #000; padding: 3px 8px; border-radius: 12px; font-weight: bold; font-size: clamp(0.75rem, 3vw, 0.9rem); white-space: nowrap; }

        .header-controls { display: flex; gap: 8px; }
        .icon-btn { background: none; border: none; color: white; font-size: clamp(1.2rem, 4vw, 1.4rem); cursor: pointer; padding: 3px; }

        .status-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.05); padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); width: 100%; }
        .player-info { display: flex; align-items: center; gap: 10px; font-size: clamp(0.9rem, 3vw, 1rem); font-weight: bold; }
        .clock { background: #1a1a24; padding: 4px 8px; border-radius: 6px; font-family: monospace; font-size: clamp(0.9rem, 3.5vw, 1.1rem); border: 1px solid #444; }
        .clock.active { background: #2c3e50; border-color: var(--selected); color: var(--selected); }
        .captured-tray { min-height: 20px; display: flex; align-items: center; margin-top: 2px; }
        .captured-tray svg { width: clamp(14px, 3.5vw, 18px); height: clamp(14px, 3.5vw, 18px); margin-left: -4px; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.8)); }

        .board-wrapper { display: flex; gap: 8px; align-items: stretch; width: 100%; justify-content: center; }
        .eval-bar-container { width: clamp(8px, 2.5vw, 14px); background: #111; border: 1px solid #333; border-radius: 4px; position: relative; overflow: hidden; flex-shrink: 0; }
        .eval-bar-fill { position: absolute; top: 50%; bottom: 0; left: 0; right: 0; background: #fff; transition: top 0.5s ease-in-out; }

        #board { flex-grow: 1; display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); aspect-ratio: 1; border: 3px solid #2a2a2a; border-radius: 4px; background: #fff; width: 100%; max-width: 100%; }

        .square { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; cursor: pointer; }
        .square.dark { background-color: var(--board-dark); }
        .square.light { background-color: var(--board-light); }

        .piece { width: 90%; height: 90%; cursor: pointer; z-index: 2; filter: drop-shadow(0px 4px 3px rgba(0,0,0,0.4)); pointer-events: none;}

        .square.selected::before { content: ''; position: absolute; inset: 0; background-color: var(--selected); z-index: 1; }
        .square.last-move::before { content: ''; position: absolute; inset: 0; background-color: var(--last-move); z-index: 1; }
        .square.best-hint::before { content: ''; position: absolute; inset: 0; border: 3px solid #3498db; background-color: var(--best-move); z-index: 1; }
        
        .square.valid-move::after { content: ''; position: absolute; width: 25%; height: 25%; background-color: var(--highlight); border-radius: 50%; z-index: 1; }
        .square.valid-capture::after { width: 85%; height: 85%; background-color: transparent; border: 5px solid var(--highlight); border-radius: 50%; }
        
        .square.premove-src::before { content: ''; position: absolute; inset: 0; background-color: var(--premove-src); z-index: 1; }
        .square.premove-dst::after { content: ''; position: absolute; width: 85%; height: 85%; background-color: transparent; border: 5px solid var(--premove-dst); border-radius: 50%; z-index: 1; }

        .square.in-check { background-color: var(--danger) !important; }

        .coord-rank { position: absolute; top: 1px; left: 2px; font-size: clamp(0.45rem, 1.5vw, 0.6rem); font-weight: bold; opacity: 0.7; pointer-events: none; z-index: 1; }
        .coord-file { position: absolute; bottom: 0px; right: 2px; font-size: clamp(0.45rem, 1.5vw, 0.6rem); font-weight: bold; opacity: 0.7; pointer-events: none; z-index: 1; }
        .dark .coord-rank, .dark .coord-file { color: var(--board-light); }
        .light .coord-rank, .light .coord-file { color: var(--board-dark); }

        #opening-badge { text-align: center; font-size: clamp(0.75rem, 2.5vw, 0.9rem); color: var(--selected); min-height: 18px; font-weight: bold; width: 100%; }

        .notation-panel { background: #1a1a24; border: 1px solid #333; border-radius: 6px; height: 50px; overflow-y: auto; padding: 5px 10px; font-family: monospace; font-size: clamp(0.8rem, 2.5vw, 0.95rem); display: flex; flex-wrap: wrap; gap: 8px; width: 100%; }
        .notation-move { color: #ccc; } .notation-move.active { color: var(--selected); font-weight: bold; }
        
        .utility-tray { background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 6px; padding: 8px; display: flex; flex-direction: column; gap: 6px; width: 100%; }
        .tray-row { display: flex; gap: 5px; width: 100%; align-items: center; }
        .tray-input { flex-grow: 1; background: #111; border: 1px solid #444; color: #fff; padding: 6px; border-radius: 4px; font-size: clamp(0.75rem, 2.5vw, 0.85rem); width: 10%; }

        #mp-chat-container { display: none; flex-direction: column; gap: 5px; border-top: 1px solid #333; padding-top: 8px; margin-top: 4px; }
        #chat-log { height: 60px; overflow-y: auto; background: #0a0a0a; padding: 5px 8px; font-size: 0.8rem; border-radius: 4px; border: 1px solid #222; display: flex; flex-direction: column; gap: 3px; }
        .chat-msg { color: #ddd; } .chat-msg strong { color: var(--selected); }

        .controls { display: flex; justify-content: space-between; gap: 5px; flex-wrap: wrap; width: 100%; }
        button.action-btn { background: linear-gradient(145deg, #2a2a35, #1a1a24); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 8px 5px; border-radius: 5px; font-size: clamp(0.75rem, 2.5vw, 0.9rem); font-weight: bold; cursor: pointer; flex-grow: 1; }
        button.action-btn.active-mp { background: #27ae60; border-color: #2ecc71; }
        button.action-btn.danger { color: #ff6b6b; border-color: rgba(255,107,107,0.3); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 99; backdrop-filter: blur(4px); justify-content: center; align-items: center; }
        .modal-box { background: #1e1e28; padding: 20px; border-radius: 12px; border: 1px solid #444; width: 90%; max-width: 380px; max-height: 85vh; text-align: center; color: white; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .setting-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: clamp(0.85rem, 3vw, 1rem); }
        select { background: #1a1a24; color: white; border: 1px solid #444; padding: 6px; border-radius: 4px; width: 55%; font-size: clamp(0.85rem, 3vw, 1rem); outline:none;}

        .promo-options { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .promo-option { width: clamp(50px, 12vw, 70px); height: clamp(50px, 12vw, 70px); display: flex; justify-content: center; align-items: center; background: rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        .promo-option svg { width: 80%; height: 80%; }
        
        .stat-box { display: flex; justify-content: space-around; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px solid #333; margin-bottom: 15px; }
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-size: 1.5rem; font-weight: bold; color: var(--selected); }
        .stat-label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

        .history-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: left; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: background 0.2s;}
        .history-item:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="game-container">
        <header>
            <div class="brand-container">
                <h1>CHESS</h1>
                <div class="network-badge"><span id="network-dot" class="network-dot"></span><span id="network-text">Online</span></div>
                <div id="elo-display" class="elo-badge">⭐ 1200</div>
            </div>
            <div class="header-controls">
                <button class="icon-btn" onclick="openHistory()">📋</button>
                <button class="icon-btn" onclick="openSettings()">⚙️</button>
            </div>
        </header>

        <div class="status-bar" id="top-status">
            <div class="player-info"><span id="top-name">Stockfish</span></div>
            <div style="display:flex; flex-direction:column; align-items:flex-end;">
                <div class="clock" id="top-clock">--:--</div>
                <div id="top-captures" class="captured-tray"></div>
            </div>
        </div>

        <div class="board-wrapper">
            <div class="eval-bar-container">
                <div class="eval-bar-bg"></div>
                <div id="eval-fill" class="eval-bar-fill"></div>
            </div>
            <div id="board"></div>
        </div>

        <div class="status-bar" id="bottom-status">
            <div class="player-info"><span id="bottom-name">You</span></div>
            <div style="display:flex; flex-direction:column; align-items:flex-end;">
                <div class="clock" id="bottom-clock">--:--</div>
                <div id="bottom-captures" class="captured-tray"></div>
            </div>
        </div>

        <div id="opening-badge">Starting Position</div>
        <div class="notation-panel" id="notation-panel"></div>

        <div class="utility-tray">
            <div class="tray-row">
                <input id="fen-input" class="tray-input" type="text" placeholder="Paste FEN to load position...">
                <button class="action-btn" style="flex-grow:0; padding:0 12px;" onclick="loadCustomFEN()">Load</button>
            </div>
            <div class="tray-row">
                <button id="btn-host" class="action-btn" onclick="hostMultiplayer()">🏠 Host Match</button>
                <button class="action-btn" onclick="openFriends()">👥 Address Book</button>
            </div>
            <div class="tray-row">
                <input id="mp-id-input" class="tray-input" type="text" placeholder="Paste Link or ID...">
                <button id="btn-join" class="action-btn" onclick="joinMultiplayer()">⚔️ Join</button>
            </div>
            <div class="tray-row" id="mp-info-string" style="display:none; font-size:0.85rem; color:white; justify-content:center; align-items:center;"></div>
            
            <div id="mp-chat-container">
                <div id="chat-log"></div>
                <div style="display:flex; gap:5px; margin-top:3px;">
                    <input id="chat-input" type="text" class="tray-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendChat()">
                    <button class="action-btn" style="flex-grow:0; padding:0 12px;" onclick="sendChat()">Send</button>
                </div>
            </div>
        </div>

        <!-- NEW Confirm Move UI Matrix -->
        <div class="controls" id="confirm-tray" style="display:none; margin-bottom: 4px;">
            <button class="action-btn" style="background:#27ae60;" onclick="confirmStagedMove()">✔️ Confirm Move</button>
            <button class="action-btn danger" onclick="cancelStagedMove()">❌ Cancel</button>
        </div>

        <div class="controls" id="game-controls">
            <button class="action-btn" onclick="exportPGN()">📥 PGN</button>
            <button class="action-btn" onclick="offerDraw()">🤝 Draw</button>
            <button class="action-btn danger" onclick="resignGame()">🏳️ Resign</button>
            <button class="action-btn" onclick="initGame()">🔄 Restart</button>
        </div>
        
        <div class="controls" id="review-controls" style="display:none;">
            <button class="action-btn" onclick="reviewStep(-999)">⏮</button>
            <button class="action-btn" onclick="reviewStep(-1)">◀</button>
            <button class="action-btn" style="background:#2980b9;" onclick="triggerBestMoveAnalysis()">💡 Best Move</button>
            <button class="action-btn" onclick="reviewStep(1)">▶</button>
            <button class="action-btn" onclick="reviewStep(999)">⏭</button>
            <button class="action-btn danger" onclick="exitReview()">Exit</button>
        </div>
    </div>

    <!-- Modals -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="margin-top:0; border-bottom: 1px solid #333; padding-bottom:10px;">Settings</h3>
            <div class="setting-group"><label>Play As:</label><select id="set-color"><option value="white">White</option><option value="black">Black</option></select></div>
            <div class="setting-group"><label>Opponent:</label><select id="set-mode"><option value="cpu">Computer (AI)</option><option value="pvp">Local Pass & Play</option></select></div>
            <div class="setting-group"><label>AI Level:</label>
                <select id="set-difficulty">
                    <option value="450">Noob (450)</option><option value="800">Beginner (800)</option>
                    <option value="1200">Amateur (1200)</option><option value="1600">Advanced (1600)</option><option value="2200">Master (2200+)</option>
                </select>
            </div>
            <div class="setting-group"><label>Clock:</label><select id="set-time"><option value="unlimited">Unlimited</option><option value="600">Rapid (10m)</option><option value="180">Blitz (3m)</option><option value="60">Bullet (1m)</option></select></div>
            
            <div class="setting-group"><label>Confirm Move:</label><select id="set-confirm"><option value="off">Off</option><option value="on">On (Double Tap)</option></select></div>
            <div class="setting-group"><label>Premove:</label><select id="set-premove"><option value="off">Off</option><option value="single">Single</option><option value="multiple">Multiple</option></select></div>

            <div class="setting-group"><label>Theme:</label>
                <select id="set-theme"><option value="slate">Slate Blue</option><option value="wood">Classic Wood</option><option value="emerald">Emerald</option><option value="pink">Pink & White</option><option value="coral">Coral</option><option value="purple">Purple</option></select>
            </div>
            <div class="setting-group"><label>Explorer:</label><select id="set-explorer" onchange="previewOpening(this.value)"><option value="">-- Choose Setup --</option><option value="e4 c5">Sicilian Defense</option><option value="e4 e5 Nf3 Nc6 Bb5">Ruy Lopez</option><option value="d4 d5 c4">Queen's Gambit</option><option value="e4 e6">French Defense</option></select></div>
            <div class="setting-group"><label>Sound FX:</label><select id="set-sound"><option value="on">On</option><option value="off">Off</option></select></div>
            <button class="action-btn" style="width:100%; margin-top:10px; padding:12px;" onclick="closeSettingsAndRestart()">Save & Apply</button>
            <button class="action-btn" style="width:100%; margin-top:5px; padding:10px; background: transparent; border: none; color: #aaa;" onclick="document.getElementById('settings-modal').style.display='none'">Cancel</button>
        </div>
    </div>

    <div id="friends-modal" class="modal-overlay">
        <div class="modal-box" style="padding: 15px;">
            <h3 style="margin-top:0; border-bottom: 1px solid #333; padding-bottom:10px;">Address Book</h3>
            <div style="display:flex; gap:5px; margin-bottom:15px;">
                <input id="new-friend-name" class="tray-input" type="text" placeholder="Name" style="width:40%;">
                <input id="new-friend-id" class="tray-input" type="text" placeholder="Peer ID" style="width:60%;">
                <button class="action-btn" style="flex-grow:0; padding: 0 12px;" onclick="addFriend()">+</button>
            </div>
            <div id="friends-list-container" style="max-height: 40vh; overflow-y: auto; padding-right: 5px;"></div>
            <button class="action-btn" style="width:100%; margin-top:15px; padding: 12px;" onclick="closeFriends()">Close</button>
        </div>
    </div>

    <div id="promotion-modal" class="modal-overlay"><div class="modal-box"><h3 style="margin-top:0;">Promote Pawn</h3><div class="promo-options" id="promo-options-container"></div></div></div>

    <div id="game-over-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="game-over-title" style="margin-top:0; font-size: 1.8rem;">Checkmate</h3>
            <div id="game-over-text" style="margin-bottom: 5px;"></div>
            <div id="elo-change-text" style="color:#ffd700; margin-bottom:15px; font-weight:bold;"></div>
            
            <div class="stat-box">
                <div class="stat-item"><span class="stat-val" id="stat-mistakes" style="color:#e67e22;">0</span><span class="stat-label">Mistakes</span></div>
                <div class="stat-item"><span class="stat-val" id="stat-blunders" style="color:#e74c3c;">0</span><span class="stat-label">Blunders</span></div>
            </div>

            <button class="action-btn" style="width:100%; margin-bottom:8px; padding:12px;" onclick="openReviewFromEnd()">Analyze Match</button>
            <button class="action-btn" style="width:100%; padding:12px;" onclick="initGame()">Play Again</button>
        </div>
    </div>

    <div id="history-modal" class="modal-overlay">
        <div class="modal-box" style="padding: 15px;">
            <h3 style="margin-top:0; border-bottom: 1px solid #333; padding-bottom:10px;">Match Log</h3>
            <div id="history-list" style="max-height: 50vh; overflow-y: auto; padding-right: 5px;"></div>
            <button class="action-btn" style="width:100%; margin-top:15px; padding: 12px;" onclick="closeHistory()">Close</button>
        </div>
    </div>

<script>
    var boardEl = document.getElementById('board');
    var evalFill = document.getElementById('eval-fill');
    var promoModal = document.getElementById('promotion-modal');
    var promoContainer = document.getElementById('promo-options-container');
    var settingsModal = document.getElementById('settings-modal');
    var gameOverModal = document.getElementById('game-over-modal');
    var historyModal = document.getElementById('history-modal');
    var friendsModal = document.getElementById('friends-modal');
    var reviewControls = document.getElementById('review-controls');
    var gameControls = document.getElementById('game-controls');
    var confirmTray = document.getElementById('confirm-tray');
    var notationPanel = document.getElementById('notation-panel');
    var openingBadge = document.getElementById('opening-badge');

    const SVGS = {

    function playSound(type) {
        if (!soundEnabled) return;
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (type === 'gameover') { playTone(300, 0.4, 0.8); playTone(400, 0.4, 0.8); playTone(500, 0.4, 0.8); return; }
            if (type === 'check') { playTone(600, 0.3, 0.1); setTimeout(() => playTone(600, 0.3, 0.2), 100); return; }
            if (type === 'castle') { playTone(200, 0.2, 0.1); setTimeout(() => playTone(250, 0.2, 0.1), 80); return; }
            if (type === 'capture') { playTone(800, 0.4, 0.1, 400); return; }
            playTone(150, 0.3, 0.1, 80); 
        } catch (e) {}
    }

    function playTone(freq, vol, duration, slideTo) {
        var osc = audioCtx.createOscillator(); var gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    var stockfishWorker = null; var currentEvalScore = 0; var previousEvalScore = 0; var engineMode = 'idle';
    function initStockfish() {
        if (window.location.protocol === 'file:') return console.log("Local File Mode: Bypassing local worker.");
        try {
            stockfishWorker = new Worker('stockfish.js');
            stockfishWorker.onmessage = function(event) {
                var msg = event.data;
                if (msg.indexOf("info depth") !== -1 && msg.indexOf("score cp") !== -1) {
                    var scoreMatch = msg.match(/score cp (-?\d+)/);
                    if (scoreMatch) {
                        currentEvalScore = parseInt(scoreMatch[1], 10) / 100.0;
                        if (currentPlayer === 'black') currentEvalScore = -currentEvalScore;
                        var clamped = Math.max(-15, Math.min(15, currentEvalScore));
                        evalFill.style.top = (50 - (clamped * 3.33)) + '%';
                    }
                }
                if (msg.indexOf("bestmove") !== -1) {
                    var match = msg.match(/bestmove\s([a-h][1-8][a-h][1-8][qrbn]?)/);
                    if (match && match[1]) {
                        if (engineMode === 'review') { parseAnalysisHint(match[1]); } 
                        else if (engineMode === 'play' && aiThinking) { parseAndExecuteStockfishMove(match[1]); }
                    } else if (engineMode === 'play' && aiThinking) { makeAIMoveFallback(); }
                }
            };
            stockfishWorker.postMessage("uci"); 
        } catch (error) { stockfishWorker = null; }
    }

    function calculateAccuracyDrop() {
        if (currentMode !== 'cpu' || isMultiplayerActive || gameHistoryLog.length < 2) return;
        var diff = previousEvalScore - currentEvalScore;
        if (diff > 1.5 && diff <= 3.0) matchMistakes++;
        if (diff > 3.0) matchBlunders++;
        document.getElementById('stat-mistakes').innerText = matchMistakes;
        document.getElementById('stat-blunders').innerText = matchBlunders;
    }

            if (saved) {

                soundEnabled = s.soundEnabled !== undefined ? s.soundEnabled : true;
                currentDifficulty = s.currentDifficulty || '2200'; playerColor = s.playerColor || 'white';
                timeControlSetting = s.timeControlSetting || 'unlimited';
                confirmMoveSetting = s.confirmMoveSetting || 'off'; premoveSetting = s.premoveSetting || 'off';
            }
        } catch(e) {}
        document.getElementById('set-color').value = playerColor; document.getElementById('set-mode').value = currentMode;
        document.getElementById('set-difficulty').value = currentDifficulty; document.getElementById('set-theme').value = currentTheme;
        document.getElementById('set-time').value = timeControlSetting; document.getElementById('set-sound').value = soundEnabled ? 'on' : 'off';
        document.getElementById('set-confirm').value = confirmMoveSetting; document.getElementById('set-premove').value = premoveSetting;

            var s = winnerCol === playerColor ? 1 : (winnerCol === 'draw' ? 0.5 : 0);
            var diff = Math.round(32 * (s - expected)); playerElo += diff; localStorage.setItem('chessPlayerElo', playerElo);
            document.getElementById('elo-change-text').innerText = (diff >= 0 ? "+" : "") + diff + " ELO (New: " + playerElo + ")";
            document.getElementById('elo-display').innerText = "⭐ " + playerElo;
            try { var saved = JSON.parse(localStorage.getItem('chessMatches') || '[]'); saved.unshift({ date: new Date().toLocaleDateString(), mode: currentDifficulty + ' ELO AI', result: resultStr, moves: gameHistoryLog }); if (saved.length > 10) saved.pop(); localStorage.setItem('chessMatches', JSON.stringify(saved)); } catch(e){}
        } else { document.getElementById('elo-change-text').innerText = "Friendly Match (Unrated)"; }
        updateUI(); gameOverModal.style.display = 'flex';
    }

    function triggerAI() {
        aiThinking = true; engineMode = 'play';
        if (currentDifficulty === '450') { if (Math.random() > 0.5) { setTimeout(makeAIMoveFallback, 400); return; } }
        
        if (stockfishWorker) {
            stockfishWorker.postMessage("stop");
            var skillLvl = 20; var depthLvl = 10;
            if (currentDifficulty === '450') { skillLvl = 0; depthLvl = 1; } else if (currentDifficulty === '800') { skillLvl = 1; depthLvl = 1; } else if (currentDifficulty === '1200') { skillLvl = 5; depthLvl = 3; } else if (currentDifficulty === '1600') { skillLvl = 10; depthLvl = 6; }
            stockfishWorker.postMessage("setoption name Skill Level value " + skillLvl); stockfishWorker.postMessage("position fen " + getBoardFEN()); stockfishWorker.postMessage("go depth " + depthLvl); 
        } else { setTimeout(makeAIMoveFallback, 500); }
    }

    function triggerBestMoveAnalysis() { if (!stockfishWorker || !isReviewMode) return; engineMode = 'review'; stockfishWorker.postMessage("stop"); stockfishWorker.postMessage("position fen " + getBoardFEN()); stockfishWorker.postMessage("go depth 12"); }
    function parseAnalysisHint(moveStr) { var fromFile = moveStr.charCodeAt(0) - 97; var fromRank = 8 - parseInt(moveStr.charAt(1)); var toFile = moveStr.charCodeAt(2) - 97; var toRank = 8 - parseInt(moveStr.charAt(3)); reviewBestFrom = fromRank * 8 + fromFile; reviewBestTo = toRank * 8 + toFile; updateUI(); }

    function parseAndExecuteStockfishMove(moveStr) {
        var fromFile = moveStr.charCodeAt(0) - 97; var fromRank = 8 - parseInt(moveStr.charAt(1)); var toFile = moveStr.charCodeAt(2) - 97; var toRank = 8 - parseInt(moveStr.charAt(3)); var promo = moveStr.length > 4 ? moveStr.charAt(4) : null;
        aiThinking = false; if (promo) board[fromRank * 8 + fromFile] = currentPlayer === 'white' ? promo.toUpperCase() : promo.toLowerCase(); executeMove(fromRank * 8 + fromFile, toRank * 8 + toFile, true);
    }

    function makeAIMoveFallback() {
        if (isGameOver || isReviewMode || currentPlayer === playerColor) return; 
        var moves = []; for (var i=0; i<64; i++) if (getColor(board[i]) === currentPlayer) { var lm = getLegalMoves(i); for(var j=0; j<lm.length; j++) moves.push({f:i, t:lm[j]}); }
        if (moves.length === 0) return; 
        if (currentDifficulty === '450' && Math.random() > 0.1) { var rM = moves[Math.floor(Math.random() * moves.length)]; aiThinking = false; executeMove(rM.f, rM.t, true); return; }
        var chosen = moves[Math.floor(Math.random() * moves.length)]; aiThinking = false; executeMove(chosen.f, chosen.t, true);
    }

    function updateUI() {
        boardEl.innerHTML = ''; var checkKingIdx = isKingInCheck(currentPlayer); updateClocks();
        var renderInverted = (playerColor === 'black' || (isMultiplayerActive && multiplayerRole === 'black'));

        if (stagedMove && !isReviewMode && !isGameOver) { confirmTray.style.display = 'flex'; gameControls.style.display = 'none'; } 
        else { confirmTray.style.display = 'none'; gameControls.style.display = 'flex'; }

        for (var visualIdx = 0; visualIdx < 64; visualIdx++) {
            var logicalIdx = renderInverted ? 63 - visualIdx : visualIdx; var rc = getRC(logicalIdx); var sq = document.createElement('div');
            sq.className = 'square ' + ((rc.r + rc.c) % 2 === 1 ? 'dark' : 'light');
            
            if (logicalIdx === selectedIdx) sq.classList.add('selected');
            if (logicalIdx === lastMoveFrom || logicalIdx === lastMoveTo) sq.classList.add('last-move');
            if (logicalIdx === reviewBestFrom || logicalIdx === reviewBestTo) sq.classList.add('best-hint');
            if (validMoves.indexOf(logicalIdx) !== -1) { sq.classList.add('valid-move'); if (board[logicalIdx]) sq.classList.add('valid-capture'); }
            if (logicalIdx === checkKingIdx && !isGameOver) sq.classList.add('in-check');
            
            if (stagedMove && (logicalIdx === stagedMove.from || logicalIdx === stagedMove.to)) { sq.style.backgroundColor = 'rgba(46, 204, 113, 0.5)'; }
            for (var pm = 0; pm < premoves.length; pm++) { if (logicalIdx === premoves[pm].from) sq.classList.add('premove-src'); if (logicalIdx === premoves[pm].to) sq.classList.add('premove-dst'); }

            if (visualIdx % 8 === 0) { var rL = document.createElement('span'); rL.className = 'coord-rank'; rL.innerText = renderInverted ? rc.r + 1 : 8 - rc.r; sq.appendChild(rL); }
            if (Math.floor(visualIdx / 8) === 7) { var fL = document.createElement('span'); fL.className = 'coord-file'; fL.innerText = String.fromCharCode(97 + rc.c); sq.appendChild(fL); }

            if (board[logicalIdx]) {
                var p = document.createElement('div'); p.className = 'piece'; p.innerHTML = SVGS[board[logicalIdx]];
                sq.appendChild(p);
            }
            (function(lIdx){ sq.addEventListener('pointerdown', function(){ handleSquareClick(lIdx); }); })(logicalIdx); 
            boardEl.appendChild(sq);
        }
        
        var notHTML = ""; for(var i=0; i<algebraicMoves.length; i++){ if(i%2===0) notHTML += `<span style="color:#666;">${Math.floor(i/2)+1}.</span> `; notHTML += `<span class="notation-move ${i===algebraicMoves.length-1?'active':''}">${algebraicMoves[i]}</span> `; }
        notationPanel.innerHTML = notHTML; notationPanel.scrollTop = notationPanel.scrollHeight;

        var wH = ""; for(var w=0; w<capturedWhite.length; w++) wH += SVGS[capturedWhite[w]]; var bH = ""; for(var b=0; b<capturedBlack.length; b++) bH += SVGS[capturedBlack[b]]; 
        document.getElementById('top-captures').innerHTML = playerColor === 'white' ? bH : wH; document.getElementById('bottom-captures').innerHTML = playerColor === 'white' ? wH : bH;
    }

    function openHistory() { try { var savedGames = JSON.parse(localStorage.getItem('chessMatches') || '[]'); var lc = document.getElementById('history-list'); lc.innerHTML = ''; if (savedGames.length === 0) { lc.innerHTML = '<p style="color:#aaa; font-size: 0.9rem;">No games played yet. Finish a match against the AI to save your history.</p>'; } else { for (var i = 0; i < savedGames.length; i++) { (function(index, game) { var div = document.createElement('div'); div.className = 'history-item'; div.innerHTML = '<div class="hist-date">' + game.date + ' | ' + game.mode + '</div><div class="hist-title">' + game.result + '</div>'; div.onclick = function() { reviewGameData = game.moves; historyModal.style.display = 'none'; startReviewSession(); }; lc.appendChild(div); })(i, savedGames[i]); } } historyModal.style.display = 'flex'; } catch(e){} }
    function closeHistory() { historyModal.style.display = 'none'; }
    function openReviewFromEnd() { reviewGameData = gameHistoryLog; gameOverModal.style.display = 'none'; startReviewSession(); }
    function startReviewSession() { isReviewMode = true; reviewIndex = reviewGameData.length - 1; gameControls.style.display = 'none'; confirmTray.style.display = 'none'; reviewControls.style.display = 'flex'; selectedIdx = null; validMoves = []; applyReviewFrame(); }
    function exitReview() { initGame(); }
    function reviewStep(step) { reviewIndex += step; if(reviewIndex < 0) reviewIndex = 0; if(reviewIndex >= reviewGameData.length) reviewIndex = reviewGameData.length - 1; applyReviewFrame(); }
        function applyReviewFrame() { 
        var frame = reviewGameData[reviewIndex]; 
        board = frame.board.slice(); 
        currentPlayer = frame.turn; 
        lastMoveFrom = null; lastMoveTo = null; 
        reviewBestFrom = null; reviewBestTo = null; 
        
        // Calculate basic material advantage for the Eval Bar
        var wScore = 0; var bScore = 0; 
        for(var i=0; i<64; i++) { 
            if(board[i]) { 
                var val = PIECE_VALUES[board[i].toLowerCase()] || 0; 
                if(board[i] >= 'A' && board[i] <= 'Z') wScore += val; 
                else bScore += val; 
            } 
        }
        var clamped = Math.max(-15, Math.min(15, wScore - bScore)); 
        document.getElementById('eval-fill').style.top = (50 - (clamped * 3.33)) + '%';
        
        updateUI(); 
    }
  window.addEventListener('load', function() {
        loadSettings(); updateConnectionStatus(); initGame(); initStockfish();
        if ('serviceWorker' in navigator && window.location.protocol !== 'file:') { navigator.serviceWorker.register('sw.js').catch(e => console.log(e)); }
    });
</script>
